        display: block;
        width: min(120px, 28vw);
        height: auto;
        aspect-ratio: 56 / 61;
        overflow: visible;
        transition:
          transform 0.2s ease-in,
          opacity 0.2s ease-in;
      }

      .preloader-rect {
        transform-box: fill-box;
        transform-origin: center bottom;
      }

      .preloader-path {
        fill: #28241f;
      }

      .preloader-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .preloader-hidden svg {
        transform: scale(0.4);
        opacity: 0;
      }
